name: ci

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with test extras — the official MCP SDK)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Unit + integration tests
        run: python -m unittest discover -s tests -t . -v
      - name: SentinelBench (CI gate — fails on a core miss or false positive)
        run: python -m benchmark.runner

  benchmark-no-deps:
    # Proves the core clones-and-runs with zero third-party dependencies.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Demos + benchmark, stdlib only (no pip install)
        run: |
          python examples/demo.py
          python examples/payment_demo.py
          python -m benchmark.runner
          python -m benchmark.commerce_scenarios
          python examples/guardteam_demo.py
